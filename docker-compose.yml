version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agenda
    ports:
      - "5432:5432"

  api:
    build: .
    container_name: myagenda_api
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - .env